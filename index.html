<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takeout Tinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0e0e0e;
            --card-bg: #1a1a1a;
            --card-border: #2a2a2a;
            --accent-red: #ff3d3d;
            --accent-green: #2ecc71;
            --accent-yellow: #f5c518;
            --text: #f0f0f0;
            --text-muted: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 16px;
        }

        /* subtle radial glow behind everything */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(255,61,61,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .header {
            text-align: center;
            margin-bottom: 18px;
        }

        .header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .header h2 span { color: var(--accent-red); }

        .progress-bar-wrap {
            width: 280px;
            height: 4px;
            background: #222;
            border-radius: 99px;
            margin: 8px auto 0;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-yellow));
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        .progress-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            text-align: center;
        }

        /* Share banner */
        .share-banner {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 9px 16px;
            border-radius: 10px;
            margin: 10px auto 0;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            max-width: 300px;
            color: var(--text-muted);
            transition: border-color 0.2s;
        }
        .share-banner:hover { border-color: var(--accent-red); color: var(--text); }

        /* Card Stack */
        .card-container {
            position: relative;
            width: 290px;
            height: 370px;
        }

        /* ghost cards behind for depth */
        .card-container::before,
        .card-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 22px;
            border: 1px solid var(--card-border);
        }
        .card-container::after  { transform: rotate(-3deg) scale(0.95); top: 8px; z-index: 0; opacity: 0.5; }
        .card-container::before { transform: rotate(2deg) scale(0.96); top: 4px; z-index: 0; opacity: 0.3; }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 22px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
            padding: 24px 20px;
            z-index: 1;
            user-select: none;
        }

        .card-emoji {
            font-size: 78px;
            line-height: 1;
            margin-bottom: 16px;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
        }

        .card-name {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
        }

        .card-tag {
            margin-top: 8px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            background: #252525;
            border: 1px solid #333;
            padding: 3px 10px;
            border-radius: 99px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* swipe indicators */
        .card-label-yum,
        .card-label-nope {
            position: absolute;
            top: 22px;
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            border: 3px solid;
            padding: 4px 12px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
        }
        .card-label-yum { left: 18px; color: var(--accent-green); border-color: var(--accent-green); transform: rotate(-8deg); }
        .card-label-nope { right: 18px; color: var(--accent-red); border-color: var(--accent-red); transform: rotate(8deg); }

        /* Controls */
        .controls {
            display: flex;
            gap: 36px;
            margin-top: 26px;
            align-items: center;
        }

        .btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: transform 0.12s, box-shadow 0.12s;
            position: relative;
        }
        .btn:active { transform: scale(0.88); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

        .btn-nope { background: #ff3d3d; color: white; }
        .btn-yum  { background: #2ecc71; color: white; }

        .btn-label {
            position: absolute;
            bottom: -20px;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Match overlay */
        .match-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            font-family: 'Syne', sans-serif;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
            z-index: 100;
            text-align: center;
            padding: 24px;
        }

        .match-overlay.active { opacity: 1; pointer-events: auto; }

        .match-overlay .match-emoji { font-size: 80px; margin-bottom: 12px; animation: pop 0.4s ease; }

        @keyframes pop {
            0%   { transform: scale(0.5); }
            70%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .match-overlay .match-title {
            color: var(--accent-yellow);
            font-size: 30px;
            margin-bottom: 8px;
        }

        .match-overlay .match-sub {
            font-size: 17px;
            font-weight: 400;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            max-width: 260px;
            line-height: 1.5;
        }

        .match-overlay button {
            margin-top: 28px;
            padding: 12px 28px;
            border-radius: 99px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            background: var(--accent-yellow);
            color: #111;
            letter-spacing: 0.3px;
            transition: transform 0.1s;
        }
        .match-overlay button:active { transform: scale(0.95); }

        /* Done state */
        .done-card {
            text-align: center;
        }
        .done-card .done-emoji { font-size: 60px; margin-bottom: 12px; }
        .done-card p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="header">
    <h2>Takeout <span>Tinder</span> 🍕</h2>
    <div id="shareBanner" class="share-banner" style="display:none;" onclick="copyLink()">
        📋 Klik untuk copy link buat pasanganmu!
    </div>
    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
</div>

<div class="card-container" id="cardContainer"></div>

<div class="controls">
    <button class="btn btn-nope" onclick="swipe('left')">
        ✖
        <span class="btn-label">Nope</span>
    </button>
    <button class="btn btn-yum" onclick="swipe('right')">
        ❤
        <span class="btn-label">Yum!</span>
    </button>
</div>

<div class="match-overlay" id="matchOverlay">
    <div class="match-emoji" id="matchEmoji">🎉</div>
    <div class="match-title">IT'S A MATCH!</div>
    <div class="match-sub" id="matchText"></div>
    <button onclick="closeMatch()">Keep Swiping →</button>
</div>

        { id: 31, name: "Seblak Spicy",                emoji: "🍜", tag: "bandung" },

        { id: 38, name: "Colenak",                     emoji: "🫕", tag: "bandung" },
        { id: 39, name: "Es Cendol",                   emoji: "🥤", tag: "bandung" },
        { id: 40, name: "Martabak Telur",              emoji: "🥚", tag: "bandung" },
        { id: 41, name: "Martabak Manis",              emoji: "🥞", tag: "bandung" },
        { id: 42, name: "Lotek",                       emoji: "🥗", tag: "bandung" },
        { id: 43, name: "Nasi Tutug Oncom",            emoji: "🍚", tag: "bandung" },
        { id: 44, name: "Dimsum",                      emoji: "🥟", tag: "classic" },
        { id: 45, name: "Wagyu Katsu",                 emoji: "🥩", tag: "classic" },
        { id: 46, name: "Matcha Mille Crepe",          emoji: "🍰", tag: "classic" },
    ];

    let currentIndex = 0;
    let roomCode = null;
    let playerRole = null;
    let partnerLink = "";
    let seenMatchIds = new Set();
    
    // Track both likes and dislikes locally
    let myLikesLocal = []; 
    let myDislikesLocal = [];

    // NEW: Deterministic Hash Function
    function getHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = Math.imul(31, hash) + str.charCodeAt(i) | 0;
        return hash;
    }

    function updateProgress() {
        const pct = Math.round((currentIndex / foods.length) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressLabel').innerText = `${currentIndex} / ${foods.length}`;
    }

    // Touch / Swipe support for iPad and Mobile
    let touchStartX = 0;
    let touchEndX = 0;

    // Listen for where the finger starts touching the screen
    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    // Listen for where the finger leaves the screen
    document.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleTouchGesture();
    }, { passive: true });

    // If the finger moved more than 50 pixels, trigger the swipe
    function handleTouchGesture() {
        const swipeThreshold = 50;
        if (touchEndX < touchStartX - swipeThreshold) {
            swipe('left');  // Swiped left
        }
        if (touchEndX > touchStartX + swipeThreshold) {
            swipe('right'); // Swiped right
        }
    }

    async function initSession() {
        const urlParams = new URLSearchParams(window.location.search);
        roomCode = urlParams.get('room');
        playerRole = urlParams.get('u');

        if (!roomCode || !playerRole) {
            roomCode = Math.random().toString(36).substring(2, 8);
            playerRole = 'a';
            const newUrl = `${window.location.pathname}?room=${roomCode}&u=a`;
            window.history.replaceState({}, '', newUrl);
            await supabaseClient.from('sessions').insert([{ id: roomCode }]);
            partnerLink = `${window.location.origin}${window.location.pathname}?room=${roomCode}&u=b`;
            document.getElementById('shareBanner').style.display = 'block';
        }

        // NEW: Sort the foods array pseudo-randomly using the roomCode as a seed
        foods.sort((a, b) => getHash(roomCode + a.id) - getHash(roomCode + b.id));

        subscribeToRoom();
        renderCard();
        updateProgress();
    }

    function copyLink() {
        navigator.clipboard.writeText(partnerLink);
        document.getElementById('shareBanner').innerText = "✅ Link ter-copy! Kirim ke pasanganmu~";
    }

    function renderCard() {
        const container = document.getElementById('cardContainer');
        if (currentIndex >= foods.length) {
            container.innerHTML = `
                <div class='card done-card'>
                    <div class='done-emoji'>😭</div>
                    <strong style='font-family:Syne,sans-serif;font-size:18px;'>Habis deh...</strong>
                    <p style='margin-top:8px;'>Semua makanan udah di-swipe!<br>Semoga ada yang match 🤞</p>
                </div>`;
            return;
        }

        const food = foods[currentIndex];
        container.innerHTML = `
            <div class='card' id='currentCard'>
                <span class='card-label-yum' id='labelYum'>YUM ❤</span>
                <span class='card-label-nope' id='labelNope'>NOPE ✖</span>
                <div class='card-emoji'>${food.emoji}</div>
                <div class='card-name'>${food.name}</div>
                <div class='card-tag'>${food.tag}</div>
            </div>`;

        updateProgress();
    }

    async function renderFinalSummary(sessionData = null) {
        const container = document.getElementById('cardContainer');
        
        // If data isn't passed from the live listener, fetch it from Supabase
        let data = sessionData;
        if (!data) {
            container.innerHTML = `<div class='card done-card'>Sedang memuat hasil... ⏳</div>`;
            const res = await supabaseClient.from('sessions').select('*').eq('id', roomCode).single();
            data = res.data;
        }
        if (!data) return;

        // Grab arrays
        const likesA = data.user_a_likes || [];
        const likesB = data.user_b_likes || [];
        const dislikesA = data.user_a_dislikes || [];
        const dislikesB = data.user_b_dislikes || [];

        // Find intersections
        const commonLikes = likesA.filter(id => likesB.includes(id));
        const commonDislikes = dislikesA.filter(id => dislikesB.includes(id));

        // Map the IDs back to the actual food names
        const likedFoods = commonLikes.map(id => foods.find(f => f.id === id)?.name).filter(Boolean);
        const dislikedFoods = commonDislikes.map(id => foods.find(f => f.id === id)?.name).filter(Boolean);

        // Build the HTML UI for the receipt
        container.innerHTML = `
            <div class='card done-card' style='justify-content: flex-start; align-items: stretch; padding: 25px 20px; overflow-y: auto; text-align: left;'>
                <h3 style='font-family:Syne,sans-serif;font-size:22px;margin-bottom:15px;text-align:center;'>Hasil Akhir 🏁</h3>
                
                <div style='margin-bottom: 15px; background: rgba(46, 204, 113, 0.1); padding: 12px; border-radius: 12px; border: 1px solid rgba(46, 204, 113, 0.3);'>
                    <strong style='color: var(--accent-green); display:block; margin-bottom: 6px;'>✅ Mutual Yums</strong>
                    <ul style='margin-left: 20px; font-size: 14px; color: #eee; line-height: 1.6;'>
                        ${likedFoods.length > 0 ? likedFoods.map(f => `<li>${f}</li>`).join('') : "<li style='list-style:none; margin-left:-20px;'>Belum ada 😭</li>"}
                    </ul>
                </div>

                <div style='background: rgba(255, 61, 61, 0.1); padding: 12px; border-radius: 12px; border: 1px solid rgba(255, 61, 61, 0.3);'>
                    <strong style='color: var(--accent-red); display:block; margin-bottom: 6px;'>❌ Mutual Ews</strong>
                    <ul style='margin-left: 20px; font-size: 14px; color: #eee; line-height: 1.6;'>
                        ${dislikedFoods.length > 0 ? dislikedFoods.map(f => `<li>${f}</li>`).join('') : "<li style='list-style:none; margin-left:-20px;'>Belum ada 🤷‍♂️</li>"}
                    </ul>
                </div>
                
                <p style='font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 15px;'>
                    (List ini update otomatis kalau pasanganmu masih swiping)
                </p>
            </div>`;
    }

    function swipe(direction) {
        if (currentIndex >= foods.length) return;
        const card = document.getElementById('currentCard');
        if (!card) return;

        const foodId = foods[currentIndex].id;

        if (direction === 'right') document.getElementById('labelYum').style.opacity = '1';
        else document.getElementById('labelNope').style.opacity = '1';

        card.style.transform = `translate(${direction === 'left' ? -340 : 340}px, -40px) rotate(${direction === 'left' ? -18 : 18}deg)`;
        card.style.opacity = '0';

        if (direction === 'right') {
            const columnToUpdate = playerRole === 'a' ? 'user_a_likes' : 'user_b_likes';
            myLikesLocal.push(foodId);
            supabaseClient.from('sessions').update({ [columnToUpdate]: myLikesLocal }).eq('id', roomCode).then(); 
        } else if (direction === 'left') {
            const columnToUpdate = playerRole === 'a' ? 'user_a_dislikes' : 'user_b_dislikes';
            myDislikesLocal.push(foodId);
            supabaseClient.from('sessions').update({ [columnToUpdate]: myDislikesLocal }).eq('id', roomCode).then(); 
        }

        setTimeout(() => {
            currentIndex++;
            renderCard();
        }, 320);
    }

function subscribeToRoom() {
        supabaseClient.channel('custom-all-channel')
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'sessions',
                filter: `id=eq.${roomCode}`
            }, payload => {
                checkForMatch(payload.new);
                
                // NEW: If you are at the end screen, update the summary list live!
                if (currentIndex >= foods.length) {
                    renderFinalSummary(payload.new);
                }
            })
            .subscribe();
    }

    function checkForMatch(sessionRow) {
        const likesA = sessionRow.user_a_likes || [];
        const likesB = sessionRow.user_b_likes || [];
        const dislikesA = sessionRow.user_a_dislikes || [];
        const dislikesB = sessionRow.user_b_dislikes || [];

        const commonLikes = likesA.filter(id => likesB.includes(id));
        const commonDislikes = dislikesA.filter(id => dislikesB.includes(id));

        const newLikeMatches = commonLikes.filter(id => !seenMatchIds.has(id));
        const newDislikeMatches = commonDislikes.filter(id => !seenMatchIds.has(id));

        if (newLikeMatches.length > 0) {
            const matchId = newLikeMatches[newLikeMatches.length - 1];
            seenMatchIds.add(matchId);
            const matchedFood = foods.find(f => f.id === matchId);
            if (!matchedFood) return;

            document.getElementById('matchEmoji').innerText = matchedFood.emoji;
            document.querySelector('.match-title').innerText = "IT'S A MATCH!";
            document.querySelector('.match-title').style.color = "var(--accent-yellow)";
            document.getElementById('matchText').innerText = `Kalian berdua mau ${matchedFood.name}! Hayuk order sekarang 🛵`;
            document.getElementById('matchOverlay').classList.add('active');
            
        } else if (newDislikeMatches.length > 0) {
            const matchId = newDislikeMatches[newDislikeMatches.length - 1];
            seenMatchIds.add(matchId);
            const matchedFood = foods.find(f => f.id === matchId);
            if (!matchedFood) return;

            document.getElementById('matchEmoji').innerText = "🙅‍♂️🙅‍♀️";
            document.querySelector('.match-title').innerText = "MUTUAL EW!";
            document.querySelector('.match-title').style.color = "var(--accent-red)";
            document.getElementById('matchText').innerText = `Kalian berdua sama-sama ogah makan ${matchedFood.name}. Skip! ❌`;
            document.getElementById('matchOverlay').classList.add('active');
        }
    }

    function closeMatch() {
        document.getElementById('matchOverlay').classList.remove('active');
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft')  swipe('left');
        if (e.key === 'ArrowRight') swipe('right');
    });

    initSession();
</script>
</body>
</html>
