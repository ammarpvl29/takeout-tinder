<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takeout Tinder</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            margin-bottom: 20px;
            text-align: center;
        }
        .card-container {
            position: relative;
            width: 300px;
            height: 400px;
        }
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #2c2c2c;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
            font-size: 24px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .card img {
            width: 80%;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }
        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .btn:active {
            transform: scale(0.9);
        }
        .btn-nope {
            background-color: #ff4b4b;
            color: white;
        }
        .btn-yum {
            background-color: #4cd964;
            color: white;
        }
        .match-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 75, 75, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Takeout Tinder 🍕</h2>
        <p>What are we eating tonight?</p>
    </div>

    <div class="card-container" id="cardContainer">
        <!-- Cards will be injected here via JS -->
    </div>

    <div class="controls">
        <button class="btn btn-nope" onclick="swipe('left')">✖</button>
        <button class="btn btn-yum" onclick="swipe('right')">❤</button>
    </div>

    <div class="match-overlay" id="matchOverlay">
        🎉 IT'S A MATCH! 🎉
        <p style="font-size: 20px; font-weight: normal;">You both want this!</p>
        <button onclick="closeMatch()" style="margin-top:20px; padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer;">Keep Swiping</button>
    </div>

    <script>
        // Customize your food database here! 
        const foods = [
            { id: 1, name: "Spicy Seblak", emoji: "🍜" },
            { id: 2, name: "Matcha Mille Crepe", emoji: "🍰" },
            { id: 3, name: "Wagyu Katsu", emoji: "🥩" },
            { id: 4, name: "Martabak Manis", emoji: "🥞" },
            { id: 5, name: "Dimsum", emoji: "🥟" }
        ];

        let currentIndex = 0;
        const container = document.getElementById('cardContainer');

        function renderCard() {
            if (currentIndex >= foods.length) {
                container.innerHTML = "<div class='card'>No more food! 😭</div>";
                return;
            }
            
            const food = foods[currentIndex];
            const card = document.createElement('div');
            card.className = 'card';
            card.id = 'currentCard';
            card.innerHTML = `<div style="font-size: 80px; margin-bottom: 20px;">${food.emoji}</div>
                              <div><strong>${food.name}</strong></div>`;
            container.innerHTML = '';
            container.appendChild(card);
        }

        function swipe(direction) {
            if (currentIndex >= foods.length) return;

            const card = document.getElementById('currentCard');
            const xMove = direction === 'left' ? -300 : 300;
            const rotate = direction === 'left' ? -20 : 20;

            card.style.transform = `translate(${xMove}px, -50px) rotate(${rotate}deg)`;
            card.style.opacity = '0';

            // Simulate a "Match" if you swipe right on the 4th item (Martabak)
            if (direction === 'right' && foods[currentIndex].name === "Martabak Manis") {
                setTimeout(() => {
                    document.getElementById('matchOverlay').style.opacity = '1';
                    document.getElementById('matchOverlay').style.pointerEvents = 'auto';
                }, 300);
            }

            setTimeout(() => {
                currentIndex++;
                renderCard();
            }, 300);
        }

        function closeMatch() {
            document.getElementById('matchOverlay').style.opacity = '0';
            document.getElementById('matchOverlay').style.pointerEvents = 'none';
        }

        // Initialize the first card
        renderCard();
    </script>
</body>
</html>
